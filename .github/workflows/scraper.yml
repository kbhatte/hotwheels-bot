name: Hot Wheels Drop Tracker

on:
  schedule:
    # Runs every 15 minutes (GitHub's cron uses UTC time)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI

jobs:
  scrape-and-alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the seen_products.json back to the repo
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Hot Wheels Tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # BLINKIT_HEADERS: ${{ secrets.BLINKIT_HEADERS }} # Uncomment when you add Blinkit headers
        run: python hotwheels_bot.py

      - name: Save State (Commit seen items)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add seen_products.json
          # Only commit if the file has changed
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update seen products state [skip ci]"
          git push
